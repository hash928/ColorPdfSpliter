<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ColorPdfSpliter - 彩色PDF分割器</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%%22 y=%2250%%22 style=%22dominant-baseline:central;text-anchor:middle;font-size:90px;%22>📁</text></svg>" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script defer src="./app.js"></script>
</head>
<body>

  <!-- ====== HEADER ====== -->
  <header class="app-header">
    <div class="header-inner">
      <div class="brand">
        <h1>
          <a href="https://github.com/huuhghhgyg/ColorPdfSpliter" target="_blank" rel="noopener">
            Color Pdf Spliter
          </a>
        </h1>
        <span class="brand-sub">with Pyodide</span>
      </div>
    </div>
  </header>

  <!-- ====== MAIN ====== -->
  <main class="app-main">

    <!-- ─── State: LOADING ─── -->
    <section id="s-loading" class="scene active">
      <div class="card loading-card">
        <div class="spinner"></div>
        <h2 class="loading-title">正在准备运行环境…</h2>
        <div class="step-list" id="stepList">
          <div class="step" data-idx="1"><span class="step-marker">1</span> 连接 Pyodide 运行时</div>
          <div class="step" data-idx="2"><span class="step-marker">2</span> 加载 PyMuPDF 引擎</div>
          <div class="step" data-idx="3"><span class="step-marker">3</span> 加载 NumPy 计算库</div>
          <div class="step" data-idx="4"><span class="step-marker">4</span> 初始化完成</div>
        </div>
        <p class="loading-hint">首次加载需下载约 15MB 依赖，请耐心等待</p>
      </div>
    </section>

    <!-- ─── State: READY ─── -->
    <section id="s-ready" class="scene">
      <div class="drop-zone" id="dropZone">
        <div class="drop-content">
          <div class="drop-icon">
            <svg width="64" height="64" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M36 8H16a4 4 0 0 0-4 4v40a4 4 0 0 0 4 4h32a4 4 0 0 0 4-4V24l-16-16z" stroke="#917b53" fill="#f5f0eb"/>
              <path d="M36 8v16h16" stroke="#917b53" fill="none"/>
              <path d="M28 38l4-4 4 4M32 34v12" stroke="#917b53" stroke-width="2"/>
            </svg>
          </div>
          <h2 class="drop-title">拖拽 PDF 文件到此处</h2>
          <p class="drop-sub">或 <span class="drop-link">点击选择文件</span></p>
          <p class="drop-hint">支持单个 PDF 文件</p>
          <input type="file" id="fileInput" accept=".pdf" disabled />
        </div>
      </div>
    </section>

    <!-- ─── State: ACTIVE ─── -->
    <section id="s-active" class="scene">

      <!-- File Card -->
      <div class="card file-card" id="fileCard">
        <div class="file-icon">
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
            <rect x="4" y="2" width="28" height="32" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="1.2"/>
            <line x1="10" y1="12" x2="26" y2="12" stroke="#d97706" stroke-width="1.2" stroke-linecap="round"/>
            <line x1="10" y1="18" x2="26" y2="18" stroke="#d97706" stroke-width="1.2" stroke-linecap="round"/>
            <line x1="10" y1="24" x2="20" y2="24" stroke="#d97706" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="file-info">
          <span class="file-name" id="fileName"></span>
          <span class="file-meta" id="fileMeta"></span>
        </div>
        <button class="btn-icon btn-remove" id="removeFileBtn" title="移除文件" aria-label="移除文件">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="4" y1="4" x2="14" y2="14"/><line x1="14" y1="4" x2="4" y2="14"/>
          </svg>
        </button>
      </div>

      <!-- ─── Options Bar ─── -->
      <div class="card options-card" id="optionsCard">
        <!-- RGBDiff -->
        <div class="opt-row">
          <label class="opt-label" for="rgbDiff">RGBDiff</label>
          <input type="range" id="rgbDiffRange" class="opt-range" min="0" max="255" value="30" />
          <input type="number" id="rgbDiff" class="opt-num" min="0" max="255" value="30" />
          <span class="opt-hint">阈值越低对彩色越敏感</span>
        </div>

        <!-- Checkboxes -->
        <div class="opt-row opt-checks">
          <label class="check-row">
            <input type="checkbox" id="duplexCheckbox" />
            <span class="check-box">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="2,6 5,9 10,3"/></svg>
            </span>
            <span class="check-text">双面打印</span>
          </label>
          <label class="check-row">
            <input type="checkbox" id="segmentedCheckbox" />
            <span class="check-box">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="2,6 5,9 10,3"/></svg>
            </span>
            <span class="check-text">分段导出（保持原始顺序）</span>
          </label>
        </div>
      </div>

      <!-- Action -->
      <div class="action-bar" id="actionBar">
        <button class="btn btn-primary" id="processBtn">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor"><polygon points="5,3 5,15 15,9"/></svg>
          开始处理
        </button>
      </div>

      <!-- Progress -->
      <div class="card progress-card" id="progressCard" hidden>
        <div class="progress-header">
          <span class="progress-label">处理进度</span>
          <span class="progress-pct" id="progressPct">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <p class="progress-text" id="progressText">正在准备…</p>
      </div>

      <!-- Results -->
      <div id="resultsWrap" hidden>
        <div class="card result-banner">
          <span class="banner-icon">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="#059669" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
          </span>
          <span class="banner-text">处理完成！</span>
        </div>
        <button class="btn btn-zip" id="zipBtn" hidden>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2h10l1 4v8a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V6l1-4z"/><line x1="2" y1="6" x2="14" y2="6"/><path d="M6 10l2 2 2-2M8 8v4"/></svg>
          下载全部 (ZIP)
        </button>
        <div class="action-row">
          <button class="btn btn-outline" id="reprocessBtn">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M2 8a6 6 0 0 1 11.3-3M14 8a6 6 0 0 1-11.3 3"/><polyline points="14 4 14 8 10 8"/></svg>
            调整选项重新处理
          </button>
          <button class="btn btn-secondary" id="resetBtn">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M2 8a6 6 0 0 1 11.3-3M14 8a6 6 0 0 1-11.3 3"/><polyline points="14 4 14 8 10 8"/><polyline points="2 12 2 8 6 8"/></svg>
            处理新文件
          </button>
        </div>
        <div class="download-list" id="downloadList"></div>
      </div>

      <!-- Error -->
      <div id="errorWrap" hidden>
        <div class="card error-banner">
          <span class="banner-icon">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="#dc2626" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="9"/><line x1="11" y1="7" x2="11" y2="12"/><circle cx="11" cy="15" r="0.6" fill="#dc2626"/></svg>
          </span>
          <span class="banner-text">处理失败</span>
        </div>
        <div class="card error-msg" id="errorMsg"></div>
        <button class="btn btn-primary" id="retryBtn">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M2 8a6 6 0 0 1 11.3-3M14 8a6 6 0 0 1-11.3 3"/><polyline points="14 4 14 8 10 8"/></svg>
          重试
        </button>
      </div>
    </section>

  </main>

  <!-- ====== CONSOLE PANEL ====== -->
  <aside class="console" id="consolePanel">
    <div class="console-bar" id="consoleBar">
      <span class="console-label">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="5,3 10,8 5,13"/></svg>
        运行日志
      </span>
      <div class="console-actions">
        <button class="btn-icon btn-clear" id="clearLogBtn" title="清空日志" aria-label="清空日志">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="2,3 5,3 6,2 9,2 10,3 13,3"/><line x1="4" y1="3" x2="4" y2="13" stroke-width="1.8"/><line x1="11" y1="3" x2="11" y2="13" stroke-width="1.8"/></svg>
        </button>
        <button class="btn-icon" id="consoleToggleBtn" title="切换日志面板" aria-label="切换日志面板">
          <svg class="chevron" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="4,6 8,10 12,6"/></svg>
        </button>
      </div>
    </div>
    <div class="console-content" id="console">
      <div class="log-line log-info">⏳ 系统初始化中…</div>
    </div>
  </aside>

</body>
</html>
